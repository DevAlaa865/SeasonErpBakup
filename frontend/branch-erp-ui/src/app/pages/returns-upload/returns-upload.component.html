<div class="p-6 bg-white rounded-2xl shadow border max-w-xl mx-auto mt-6">
  <h2 class="text-xl font-bold mb-4 text-slate-800">
    رفع ملف المرتجعات اليومية
  </h2>

  <p class="text-sm text-slate-500 mb-4">
   من فضلك ارفع ملف المرتجعات من خلال اختيار الملف ثم الضغط على رفع الملف 
    <span class="font-semibold"></span>
  </p>

  <div class="mb-4">
    <label class="block mb-2 text-sm font-medium text-slate-700">
      اختر ملف الإكسل
    </label>
    <input
      type="file"
      (change)="onFileSelected($event)"
      accept=".xlsx,.xls"
      class="block w-full text-sm text-slate-700
             file:mr-4 file:py-2 file:px-4
             file:rounded-full file:border-0
             file:text-sm file:font-semibold
             file:bg-blue-50 file:text-blue-700
             hover:file:bg-blue-100
             border rounded-lg p-1.5"
    />
  </div>

  <button
    (click)="uploadFile()"
    [disabled]="loading"
    class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-semibold
           text-white bg-blue-600 hover:bg-blue-700
           disabled:opacity-60 disabled:cursor-not-allowed"
  >
    <span *ngIf="!loading">رفع الملف</span>
    <span *ngIf="loading" class="inline-flex items-center gap-2">
      <span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
      جارٍ الرفع...
    </span>
  </button>

  <!-- رسالة نجاح -->
  <div *ngIf="message" class="mt-4 text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg p-3">
    {{ message }}
  </div>

  <!-- رسالة خطأ -->
  <div *ngIf="error" class="mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg p-3">
    {{ error }}
  </div>
</div>
