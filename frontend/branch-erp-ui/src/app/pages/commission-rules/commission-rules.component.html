<div class="commission-container">

  <section class="header-section">
    <h2>📊 قواعد العمولة</h2>
    <p class="subtitle">إدارة نسب ومكافآت العمولة للفروع والموظفين</p>
  </section>

  <!-- فورم الإضافة / التعديل -->
  <section class="form-section card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-grid">
        <div class="form-group">
          <label>أقل نسبة إنجاز (%)</label>
          <input type="number" formControlName="minPercentage" placeholder="مثال: 90">
        </div>

        <div class="form-group">
          <label>أعلى نسبة إنجاز (%)</label>
          <input type="number" formControlName="maxPercentage" placeholder="مثال: 100">
        </div>

        <div class="form-group">
          <label>مبلغ ثابت (ريال)</label>
          <input type="number" formControlName="fixedBonusAmount" placeholder="مثال: 50">
        </div>

        <div class="form-group">
          <label>النوع</label>
          <select formControlName="type">
            <option *ngFor="let t of commissionTypes" [ngValue]="t.value">{{ t.label }}</option>
          </select>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="isActive">
            نشط
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="form.invalid">
          {{ isEdit ? 'تعديل القاعدة' : 'إضافة قاعدة' }}
        </button>
        <button type="button" class="btn-secondary" (click)="resetForm()" *ngIf="isEdit">
          إلغاء التعديل
        </button>
      </div>
    </form>
  </section>

  <!-- جدول عرض القواعد -->
  <section class="table-section card">
    <table>
      <thead>
        <tr>
          <th>من (%)</th>
          <th>إلى (%)</th>
          <th>مبلغ ثابت</th>
          <th>النوع</th>
          <th>نشط؟</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rules">
          <td>{{ r.minPercentage }}</td>
          <td>{{ r.maxPercentage ?? '-' }}</td>
          <td>{{ r.fixedBonusAmount ?? '-' }}</td>
          <td>{{ r.type === CommissionType.Branch ? 'فرع' : 'موظف' }}</td>
          <td>
            <span class="status" [class.active]="r.isActive" [class.inactive]="!r.isActive">
              {{ r.isActive ? 'نشط' : 'غير نشط' }}
            </span>
          </td>
          <td class="actions">
            <button class="btn-edit" (click)="onEdit(r)">✏️ تعديل</button>
            <button class="btn-delete" (click)="onDelete(r)">🗑️ حذف</button>
          </td>
        </tr>
      </tbody>
    </table>
  </section>

</div>
