<div class="p-6 mt-10" dir="rtl">

  <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 space-y-6">

    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold">شارت مبيعات المدن والفروع</h1>

      <button
       *ngIf="filter"
        (click)="goBack()"
        class="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow">
        الرجوع للتقرير
      </button>
    </div>

    <div *ngIf="isLoading">جاري تحميل بيانات الشارت...</div>
    <div *ngIf="errorMessage" class="text-red-500">{{ errorMessage }}</div>

    <canvas #chartCanvas *ngIf="!isLoading && !errorMessage"></canvas>

  </div>

</div>
