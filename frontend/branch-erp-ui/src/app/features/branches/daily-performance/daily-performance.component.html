<div class="container mt-6">

  <!-- 🔵 هيدر الشاشة -->
  <div class="bg-gradient-to-br from-blue-50 via-purple-50 to-blue-50 p-5 rounded-2xl shadow-lg border border-blue-200 mb-6">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-blue-600 flex items-center gap-2">
        <i class="fa fa-chart-line text-blue-500"></i>
        أداء الفرع اليومي
      </h2>

      <button
        (click)="goBack()"
        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-md transition flex items-center gap-2">
        <i class="fa fa-arrow-right"></i>
        رجوع
      </button>
    </div>

    <!-- معلومات الفرع -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <div class="space-y-1">
        <label class="text-slate-700 font-semibold">📅 التاريخ</label>
        <input type="date"
               [(ngModel)]="targetDate"
               (change)="load()"
               class="form-control border-info shadow-sm">
      </div>

      <div class="space-y-1">
        <label class="text-slate-700 font-semibold">🏬 الفرع</label>
        <input type="text"
               [value]="branchName"
               class="form-control bg-light shadow-sm"
               readonly>
      </div>

      <div class="space-y-1">
        <label class="text-slate-700 font-semibold">👤 المشرف</label>
        <input type="text"
               [value]="supervisorName"
               class="form-control bg-light shadow-sm"
               readonly>
      </div>

    </div>
  </div>

  <!-- 🟣 محتوى الأداء -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- 🎯 تارجت الفرع -->
    <div class="bg-white p-5 rounded-2xl shadow-md border border-blue-200">
      <h3 class="text-lg font-bold text-blue-600 mb-3 flex items-center gap-2">
        <i class="fa fa-bullseye text-blue-500"></i>
        تارجت الفرع (من الإدارة)
      </h3>

      <label class="text-slate-700 font-semibold">قيمة التارجت</label>
      <input type="number"
             [(ngModel)]="data.branchTargetAmount"
             class="form-control border-primary shadow-sm"
             disabled>

      <p class="mt-3 text-muted small">
        هذه القيمة تأتي من ملف الإكسل الذي ترفعه الإدارة ولا يمكن تعديلها من هنا.
      </p>
    </div>

    <!-- 🏆 إنجاز الفرع -->
    <div class="bg-white p-5 rounded-2xl shadow-md border border-green-200">
      <h3 class="text-lg font-bold text-green-600 mb-3 flex items-center gap-2">
        <i class="fa fa-trophy text-green-500"></i>
        إنجاز الفرع
      </h3>

      <label class="text-slate-700 font-semibold">المبلغ المنجز</label>
      <input type="number"
             [(ngModel)]="data.branchAchievedAmount"
             class="form-control border-success shadow-sm">

      <label class="text-slate-700 font-semibold mt-3">عدد الفواتير</label>
      <input type="number"
             [(ngModel)]="data.branchInvoicesCountAchieved"
             class="form-control border-success shadow-sm">

      <label class="text-slate-700 font-semibold mt-3">عدد الأصناف</label>
      <input type="number"
             [(ngModel)]="data.branchItemsCountAchieved"
             class="form-control border-success shadow-sm">

      <button class="btn btn-success w-100 mt-4 fw-bold shadow-sm"
              (click)="saveAchievement()">
        💾 حفظ إنجاز الفرع
      </button>
    </div>

  </div>

  <!-- ⚠️ لا توجد بيانات -->
  <div *ngIf="!isLoading && !data" class="alert alert-warning mt-4 text-center fw-semibold shadow-sm">
    ⚠️ لا توجد بيانات لهذا اليوم.
  </div>

</div>
