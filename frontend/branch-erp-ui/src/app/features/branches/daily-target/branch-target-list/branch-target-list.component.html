<!-- ============================= -->
<!--        هيدر الصفحة            -->
<!-- ============================= -->

<div class="backdrop-blur-md bg-white/60 dark:bg-slate-800/40 p-4 rounded-xl shadow-md mb-6">
  <h1 class="text-2xl font-bold text-[var(--text-main)]">
    تــارجــت الــفــروع
  </h1>
</div>


<!-- ============================= -->
<!--        فلتر البحث            -->
<!-- ============================= -->

<form [formGroup]="filterForm"
      class="space-y-6 bg-white p-6 rounded-2xl shadow-md border border-gray-200">

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- المدينة -->
    <app-custom-select
      label="المدينة"
      [items]="cityOptions"
      bindLabel="name"
      bindValue="id"
      [control]="filterForm.get('cityId')">
    </app-custom-select>

    <!-- الفرع -->
    <app-custom-select
      label="الفرع"
      [items]="branchOptions"
      bindLabel="name"
      bindValue="id"
      [control]="filterForm.get('branchId')">
    </app-custom-select>

    <!-- التاريخ -->
    <div class="flex flex-col">
      <label class="text-slate-700 font-medium mb-1">التاريخ</label>
      <input type="date"
             formControlName="date"
             class="border border-gray-300 p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition" />
    </div>

  </div>

  <div class="flex justify-end">
    <button type="button"
            (click)="loadTargets()"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow transition">
      بحث
    </button>
  </div>

</form>


<!-- ============================= -->
<!--       جدول عرض التارجت       -->
<!-- ============================= -->

<div class="mt-8 bg-white p-6 rounded-2xl shadow-md border border-gray-200" dir="rtl">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold text-slate-800">نتائج البحث</h2>

    <div class="flex gap-3" *ngIf="targets.length > 0">

      <!-- زر الشارت العام -->
      <button
        (click)="openChartForAll()"
        class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg shadow transition">
        عرض الشارت
      </button>

      <!-- زر تحميل Excel -->
      <button
        (click)="exportToExcel()"
        class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg shadow transition">
        تحميل Excel
      </button>

    </div>
  </div>

  <div class="overflow-x-auto mt-6">
 <table *ngIf="targetsToShow.length > 0" class="w-full text-right text-sm table-fixed">
  <thead class="bg-blue-100 text-black">
    <tr>
      <th class="px-4 py-3 text-right w-1/5">الفرع</th>
      <th class="px-4 py-3 text-right w-1/6">التاريخ</th>
      <th class="px-4 py-3 text-right w-1/6">التارجت</th>
      <th class="px-4 py-3 text-right w-1/6">المنجز</th>
      <th class="px-4 py-3 text-right w-1/6">نسبة الإنجاز</th>
      <th class="px-4 py-3 text-right w-1/6">الإجراءات</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let t of targetsToShow"
        class="border-b hover:bg-blue-50 transition">

      <td class="px-4 py-3 font-medium text-black">
        {{ t.branchName }}
      </td>

      <td class="px-4 py-3 text-black">
        {{ t.targetDate | date:'yyyy-MM-dd' }}
      </td>

      <td class="px-4 py-3 text-black">
        {{ t.totalBranchTarget }}
      </td>

      <td class="px-4 py-3 text-black">
        {{ t.totalAchieved }}
      </td>

      <td class="px-4 py-3">
        <span
          class="px-2 py-1 rounded-full text-xs font-semibold flex items-center gap-1"
          [ngClass]="{
            'bg-green-100 text-green-700': t.achievementPercentage >= 80,
            'bg-red-100 text-red-700': t.achievementPercentage < 80
          }">

          <i class="fa"
             [ngClass]="{
               'fa-arrow-up': t.achievementPercentage >= 80,
               'fa-arrow-down': t.achievementPercentage < 80
             }"></i>

          {{ t.achievementPercentage }}%
        </span>
      </td>

      <td class="px-4 py-3 flex gap-3 justify-end">

        <button
          class="px-3 py-1.5 rounded-lg bg-gray-700 text-white hover:bg-gray-800 transition shadow-sm"
          (click)="viewDetails(t.id)">
          تفاصيل
        </button>

        <button
          class="px-3 py-1.5 rounded-lg bg-green-600 text-white hover:bg-green-700 transition shadow-sm"
          (click)="edit(t.id)">
          تعديل
        </button>

        <button
          class="px-3 py-1.5 rounded-lg bg-rose-600 text-white hover:bg-rose-700 transition shadow-sm"
          (click)="delete(t.id)">
          حذف
        </button>

      </td>

    </tr>
  </tbody>
</table>

  </div>


  <!-- ============================= -->
  <!--           الباجينيشن         -->
  <!-- ============================= -->

  <div class="flex justify-between items-center mt-6">

    <button
      class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition disabled:opacity-50"
      [disabled]="page === 1"
      (click)="page = page - 1; paginate()">
      السابق
    </button>

    <span class="text-gray-700 font-medium">
      صفحة {{ page }} من {{ totalPages }}
    </span>

    <button
      class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition disabled:opacity-50"
      [disabled]="page === totalPages"
      (click)="page = page + 1; paginate()">
      التالي
    </button>

  </div>

</div>
