<form [formGroup]="form" class="relative z-30 space-y-6 mt-14">

  <!-- Header -->
  <div class="bg-gradient-to-br from-blue-50 via-purple-50 to-blue-50 p-4 rounded-2xl shadow-lg border border-blue-200">

    <div class="flex justify-start mb-2">
      <button
        (click)="goBackToDashboard()"
        class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-md transition text-sm font-medium">
        <i class="fa fa-arrow-right"></i>
        <span>رجوع للرئيسية</span>
      </button>
    </div>

    <h2 class="text-xl font-bold text-blue-400 flex items-center gap-2 mb-2">
      <i class="fa fa-bullseye text-blue-500"></i>
      <span>تارجت الفرع اليومي</span>
    </h2>
<p class="text-sm text-slate-600 mt-2" *ngIf="currentTargetId">
  تم تحميل تارجت محفوظ لهذا اليوم ويمكنك تعديله.
</p>
    <!-- Date + Branch -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-100 p-4 rounded-xl border border-blue-200 shadow-sm">

      <!-- Date -->
      <div class="space-y-1">
        <label class="block text-base text-slate-700 mb-1">التاريخ</label>
        <div class="flex items-center gap-2 rounded-lg border border-blue-200 bg-white/20 px-3 py-2 shadow-sm">
          <i class="fa fa-calendar text-blue-500 text-base"></i>
          <input type="date"
                 formControlName="targetDate"
                 class="w-full bg-transparent text-base text-slate-800 focus:outline-none">
        </div>
      </div>

      <!-- Branch -->
               <app-custom-select
            label="الفرع"
            [items]="branchOptions"
            bindLabel="name"
            bindValue="id"
            placeholder="اختر الفرع"
            [control]="form.get('branchId')"
            iconClass="fa fa-store text-blue-500"
            errorMessage="الرجاء اختيار الفرع"
            [searchable]="true"
            [clearable]="false"
             [disabled]="isEditMode || isViewMode"
            [dropdownPosition]="'bottom'">
            
            </app-custom-select>


    </div>

  </div>

  <!-- Totals -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Total Target -->
<div class="space-y-1">
  <label class="block text-base text-slate-700 mb-1">إجمالي التارجت</label>
  <div class="flex items-center gap-2 rounded-lg border border-blue-300 bg-white px-3 py-2 shadow-md">
    <i class="fa fa-flag text-blue-500 text-base"></i>
    <input type="number"
           formControlName="totalBranchTarget"
           class="w-full bg-transparent text-base text-slate-800 focus:outline-none">
  </div>
</div>


    <!-- Total Achieved -->
<div class="space-y-1">
  <label class="block text-base text-slate-700 mb-1">إجمالي المنجز</label>
  <div class="flex items-center gap-2 rounded-lg border border-emerald-300 bg-white px-3 py-2 shadow-md">
    <i class="fa fa-check text-emerald-600 text-base"></i>
    <input type="number"
           formControlName="totalAchieved"
           class="w-full bg-transparent text-base text-slate-800 focus:outline-none">
  </div>
</div>


  </div>

  <!-- Details -->
  <div class="bg-white/85 p-6 rounded-2xl shadow-md border border-blue-200">

    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
        <i class="fa fa-users text-blue-500"></i>
        <span>تفاصيل تارجت الموظفين</span>
      </h3>

      <button type="button"
              (click)="addDetail()"
              class="px-4 py-2 rounded-lg bg-blue-600 text-white text-base font-medium hover:bg-blue-700 transition flex items-center gap-2">
        <i class="fa fa-plus"></i>
        <span>إضافة موظف</span>
      </button>
    </div>

    <div formArrayName="details" class="space-y-4">

      <div *ngFor="let row of details.controls; let i = index"
           [formGroupName]="i"
           class="p-4 rounded-xl border border-blue-200 bg-blue-50/70 shadow-sm">

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

          <!-- Employee -->
          <app-custom-select
            label="الموظف"
            [items]="employeeOptions"
            bindLabel="name"
            bindValue="id"
            placeholder="اختر الموظف"
            [control]="row.get('employeeId')"
            iconClass="fa fa-user text-blue-500"
              [disabled]="isEditMode || isViewMode"
            errorMessage="الرجاء اختيار الموظف">
          </app-custom-select>

          <!-- Shift -->
          <app-custom-select
            label="الشيفت"
            [items]="shifts"
            bindLabel="name"
            bindValue="id"
            placeholder="اختر الشيفت"
            [control]="row.get('shift')"
            iconClass="fa fa-clock text-purple-500"
              [disabled]="isEditMode || isViewMode"
            errorMessage="الرجاء اختيار الشيفت">
          </app-custom-select>

          <!-- Target -->
          <div class="space-y-1">
            <label class="block text-base text-slate-700 mb-1">التارجت</label>
            <div class="flex items-center gap-2 rounded-lg border border-blue-200 bg-white/20 px-3 py-2 shadow-sm">
              <i class="fa fa-flag text-blue-500"></i>
              <input type="number"
                     formControlName="employeeTarget"
                     class="w-full bg-transparent text-base text-slate-800 focus:outline-none">
            </div>
          </div>

          <!-- Achieved -->
          <div class="space-y-1">
            <label class="block text-base text-slate-700 mb-1">المنجز</label>
            <div class="flex items-center gap-2 rounded-lg border border-emerald-200 bg-white/20 px-3 py-2 shadow-sm">
              <i class="fa fa-check text-emerald-600"></i>
              <input type="number"
                     formControlName="employeeAchieved"
                     class="w-full bg-transparent text-base text-slate-800 focus:outline-none">
            </div>
          </div>

        </div>

        <!-- Delete -->
        <div class="flex items-end mt-3">
          <button type="button"
                  (click)="removeDetail(i)"
                  class="px-3 py-2 rounded-lg bg-rose-500 text-white text-xs font-medium hover:bg-rose-600 transition flex items-center gap-1">
            <i class="fa fa-trash"></i>
            <span>حذف</span>
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- Save -->
  <div class="flex flex-wrap gap-4">
    <button type="button"
            (click)="save()"
            class="px-5 py-2.5 rounded-lg bg-emerald-600 text-white text-base font-semibold hover:bg-emerald-700 transition flex items-center gap-2">
      <i class="fa fa-floppy-disk"></i>
      <span>حفظ التارجت</span>
    </button>
  </div>

</form>
